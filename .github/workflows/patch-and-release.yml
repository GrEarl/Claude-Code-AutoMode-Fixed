name: Patch & Release

on:
  schedule:
    - cron: "37 */6 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Force rebuild even if release already exists"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

concurrency:
  group: patch-release
  cancel-in-progress: false

env:
  GCS_BUCKET: "https://storage.googleapis.com/claude-code-dist-86c565f3-f756-42ad-8dfa-d59b1c096819/claude-code-releases"

jobs:
  patch-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Detect latest upstream version
        id: detect
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION=$(curl -fsSL "$GCS_BUCKET/latest" | tr -d '\r\n')
          if [ -z "$VERSION" ]; then
            echo "::error::Failed to read latest version"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Latest upstream version: $VERSION"

          TAG="v$VERSION"
          FORCE="${{ inputs.force || 'false' }}"

          if [ "$FORCE" = "true" ]; then
            echo "Force rebuild requested"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          STATUS=$(curl -s -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/releases/tags/$TAG")

          if [ "$STATUS" = "200" ]; then
            echo "Release $TAG already exists - skipping"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "New version $VERSION detected"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Download, patch, and release
        if: steps.detect.outputs.should_release == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          VERSION="${{ steps.detect.outputs.version }}"
          mkdir -p dist

          # ── Download manifest ──────────────────────────────────
          curl -fsSL "$GCS_BUCKET/$VERSION/manifest.json" -o manifest.json
          echo "=== manifest.json ==="
          python3 -m json.tool manifest.json

          # ── Extract platform info (platform, binary name) ─────
          # e.g.  "linux-x64 claude"  or  "win32-x64 claude.exe"
          ENTRIES=$(python3 -c "
          import json
          with open('manifest.json') as f:
              m = json.load(f)
          for p, info in m.get('platforms', {}).items():
              print(p, info.get('binary', 'claude'))
          ")

          # ── Map GCS platform to release asset name ─────────────
          platform_to_asset() {
            case "$1" in
              linux-x64)        echo "claude-linux-x64" ;;
              linux-arm64)      echo "claude-linux-arm64" ;;
              linux-x64-musl)   echo "claude-linux-x64-musl" ;;
              linux-arm64-musl) echo "claude-linux-arm64-musl" ;;
              darwin-x64)       echo "claude-macos-x64" ;;
              darwin-arm64)     echo "claude-macos-arm64" ;;
              win32-x64)        echo "claude-windows-x64.exe" ;;
              win32-arm64)      echo "claude-windows-arm64.exe" ;;
              *)                echo "claude-$1" ;;
            esac
          }

          # ── Download and patch each platform ───────────────────
          PATCHED=0
          FAILED=0

          while IFS=' ' read -r PLATFORM BINARY_NAME; do
            ASSET=$(platform_to_asset "$PLATFORM")
            URL="$GCS_BUCKET/$VERSION/$PLATFORM/$BINARY_NAME"
            echo ""
            echo "=== $PLATFORM ($BINARY_NAME) -> $ASSET ==="

            if ! curl -fsSL "$URL" -o "dist/$ASSET"; then
              echo "  SKIP: download failed ($URL)"
              FAILED=$((FAILED + 1))
              continue
            fi

            chmod +x "dist/$ASSET"
            SIZE=$(stat --format='%s' "dist/$ASSET")
            echo "  Downloaded: $SIZE bytes"

            if ! python3 scripts/patch_binary.py "dist/$ASSET"; then
              echo "  SKIP: patch failed"
              rm -f "dist/$ASSET"
              FAILED=$((FAILED + 1))
              continue
            fi

            PATCHED=$((PATCHED + 1))
          done <<< "$ENTRIES"

          echo ""
          echo "=== Results: $PATCHED patched, $FAILED failed ==="
          ls -lah dist/

          if [ "$PATCHED" -eq 0 ]; then
            echo "::error::No binaries were patched"
            exit 1
          fi

          # ── Build release notes ────────────────────────────────
          FILE_TABLE=""
          for f in dist/*; do
            NAME=$(basename "$f")
            SIZE=$(stat --format='%s' "$f" | numfmt --to=iec-i --suffix=B)
            case "$NAME" in
              *windows-x64*)       PLABEL="Windows x64" ;;
              *windows-arm64*)     PLABEL="Windows ARM64" ;;
              *linux-x64-musl*)    PLABEL="Linux x64 (musl)" ;;
              *linux-arm64-musl*)  PLABEL="Linux ARM64 (musl)" ;;
              *linux-x64*)         PLABEL="Linux x64" ;;
              *linux-arm64*)       PLABEL="Linux ARM64" ;;
              *macos-x64*)         PLABEL="macOS x64 (Intel)" ;;
              *macos-arm64*)       PLABEL="macOS ARM64 (Apple Silicon)" ;;
              *)                   PLABEL="$NAME" ;;
            esac
            FILE_TABLE="$FILE_TABLE| $PLABEL | \`$NAME\` | $SIZE |"$'\n'
          done

          # ── Publish GitHub release ─────────────────────────────
          gh release delete "v$VERSION" --yes 2>/dev/null || true
          git push --delete origin "v$VERSION" 2>/dev/null || true

          BODY=$(cat <<NOTES
          ## Claude Code v${VERSION} - Auto Mode Patch

          Patched binaries with **Auto Mode** (`claude --enable-auto-mode`) enabled by default.

          ### Patch
          \`tengu_auto_mode_config\` default changed from \`"disabled"\` to \`"enabled"\`.
          This allows \`claude --enable-auto-mode\` to work through a proxy (\`ANTHROPIC_BASE_URL\`).

          ### Downloads
          | Platform | File | Size |
          |----------|------|------|
          ${FILE_TABLE}
          ### Install
          Download and replace your \`claude\` binary:
          - **Windows** \`%USERPROFILE%\\.local\\bin\\claude.exe\`
          - **Linux / macOS** \`~/.local/bin/claude\`

          Based on Claude Code \`${VERSION}\`.
          NOTES
          )

          gh release create "v$VERSION" \
            --repo "$GITHUB_REPOSITORY" \
            --title "Claude Code v$VERSION (Auto Mode Enabled)" \
            --notes "$BODY" \
            dist/*
